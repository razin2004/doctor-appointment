<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Appointment | Dr. Sooppy's Clinic</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon1.ico') }}" type="image/x-icon">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #2563eb;
      --primary-glow: rgba(37, 99, 235, 0.4);
      --navy-deep: #020617;
      --glass-bg: rgba(255, 255, 255, 0.98);
      --glass-border: rgba(255, 255, 255, 0.2);
      --input-bg: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--navy-deep);
      background-image: linear-gradient(rgba(2, 6, 23, 0.92), rgba(2, 6, 23, 0.85)), 
                        url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2000&auto=format&fit=crop');
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* --- BACK BUTTON --- */
/* --- STICKY BACK BUTTON --- */
    .back-nav {
      position: fixed; /* Changed from absolute to fixed */
      top: 30px;
      left: 30px;
      z-index: 1000; /* Ensures it stays above all other elements */
    }
    
    .btn-back {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background:transparent; /* Added glass effect to the button */
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s;
    }
    
    .btn-back:hover { 
      background: var(--primary); 
      transform: translateX(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* Mobile adjustment to keep it from hitting the screen edge */
    @media (max-width: 600px) {
      .back-nav {
        top: 15px;
        left: 15px;
      }
      .btn-back {
        padding: 8px 14px;
        font-size: 0.8rem;
      }
    }
    /* --- FORM CONTAINER --- */
    .container {
      background: var(--glass-bg);
      width: 100%;
      max-width: 550px;
      padding: 50px;
      overflow: hidden; /* prevents overflow */
      border-radius: 35px;
      color: var(--navy-deep);
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
    }
    

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 10px;
      text-align: center;
    }
    .location-tag {
      display: block;
      text-align: center;
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
      margin-bottom: 40px;
    }

    /* --- FORM ELEMENTS --- */
    .appointment-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      color: #475569;
      margin-left: 5px;
      margin-bottom: -10px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 15px;
      border: 2px solid #e2e8f0;
      background: var(--input-bg);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      transition: 0.3s ease;
      color: var(--navy-deep);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    input::placeholder { color: #94a3b8; font-weight: 400; font-size: 0.85rem; }

    /* --- WARNINGS & TOKENS --- */
    #emailWarning, #dateWarning {
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: -15px;
      display: block;
    }

    #tokenDisplay {
      text-align: center;
      font-weight: 800;
      color: var(--primary);
      font-size: 1.1rem;
      min-height: 1.5rem;
    }

    /* --- SUBMIT BUTTON --- */
    button {
      background: var(--navy-deep);
      color: white;
      border: none;
      padding: 20px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 10px;
    }

    button:hover:not(:disabled) {
      background: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 15px 30px var(--primary-glow);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  .container {
    padding: 25px 15px;
    border-radius: 20px;
  }
}
    @media (max-width: 600px) {
      
      .back-nav { top: 20px; left: 20px; }
    }
    /* --- PROFESSIONAL ALERTS --- */
.status-msg {
  display: none; /* Hidden by default */
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 10px;
  line-height: 1.4;
  border: 1px solid transparent;
  align-items: center;
  gap: 10px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.status-error {
  display: flex;
  background-color: #fef2f2;
  color: #991b1b;
  border-color: #fecaca;
}

.status-info {
  display: flex;
  background-color: #eff6ff;
  color: #1e40af;
  border-color: #bfdbfe;
}

.status-msg i { font-size: 1.1rem; }
.toast-msg {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 10px;
  animation: fadeIn 0.3s ease;
  border: 1px solid transparent;
}

.toast-error {
  display: flex;
  background: #fef2f2;
  color: #991b1b;
  border-color: #fecaca;
}

.toast-success {
  display: flex;
  background: #ecfdf5;
  color: #065f46;
  border-color: #bbf7d0;
}

.toast-info {
  display: flex;
  background: #eff6ff;
  color: #1e40af;
  border-color: #bfdbfe;
}
input {
  width: 100%;
  max-width: 100%;
}
input[type="date"] {
  min-width: 0; /* prevents Safari overflow */
}
input[type="date"] {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  display: block;

  -webkit-appearance: none;
  appearance: none;

  box-sizing: border-box;
  padding: 14px 12px;
}
  </style>
</head>
<body>

  <div class="back-nav">
    <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Home</a>
  </div>

  <div class="container">
    <h2>Book Appointment</h2>
    <span class="location-tag"><i class="fa-solid fa-location-dot"></i> Koothali Clinic</span>

    <form method="POST" class="appointment-form" id="appointmentForm">
      <input type="text" name="botcheck" style="display:none;">
<div id="toastMsg" class="toast-msg">
  <i id="toastIcon" class="fa-solid"></i>
  <span id="toastText"></span>
</div>
      <div>
        <label>Full Name</label>
        <input type="text" name="name" id="name" required placeholder="Enter Patient Name">
      </div>

      <div>
        <label>Age</label>
        <input type="number" name="age" min="0" max="110" required placeholder="Enter Patient Age">
      </div>

      <div>
        <label>Phone Number <span style="font-weight: normal; font-size: 0.85em; color: #94a3b8;">(Optional)</span></label>
        <input type="tel" name="email" id="email" placeholder="123-456-7890">
        <span id="emailWarning" style="color: #ef4444;"></span>
      </div>

      <div>
        <label>Preferred Date</label>
        <input type="date" name="date" required>
      </div>

      <p id="tokenDisplay"></p>

      <button type="submit" id="submitBtn">Confirm Appointment</button>
    </form>
  </div>

  <script>
    // Name field validation - allow only letters and spaces
    document.getElementById("name").addEventListener("input", function () {
      this.value = this.value.replace(/[^a-zA-Z\s]/g, '');
    });

    document.addEventListener('DOMContentLoaded', function () {
      const dateInput = document.querySelector('input[name="date"]');
      const tokenDisplay = document.getElementById("tokenDisplay");

      document.getElementById("email").addEventListener("input", function () {
        const emailInput = this;
        const warning = document.getElementById("emailWarning");
        const value = emailInput.value.trim().toLowerCase();
        const allowedDomains = ["gmail.com", "hotmail.com", "yahoo.com"];

        if (value === "") {
          warning.textContent = "";
          return;
        }

        if (!value.includes("@")) {
          warning.textContent = "Invalid email address.";
          return;
        }

        const parts = value.split("@");
        const localPart = parts[0];
        const domain = parts[1];

        if (
          parts.length !== 2 || 
          !/^[a-z0-9.]+$/i.test(localPart) || 
          !allowedDomains.includes(domain)
        ) {
          warning.textContent = "Invalid email address.";
        } else {
          warning.textContent = "";
        }
      });

      function formatDate(date) {
        const year = date.getFullYear();
        const month = ('0' + (date.getMonth() + 1)).slice(-2);
        const day = ('0' + date.getDate()).slice(-2);
        return `${year}-${month}-${day}`;
      }

      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);

      const todayStr = formatDate(today);
      const tomorrowStr = formatDate(tomorrow);

      dateInput.min = todayStr;
      dateInput.max = tomorrowStr;

      dateInput.addEventListener('change', function () {
        document.getElementById("dateWarning").textContent = "";
        const selectedDate = this.value;
        const selectedDay = new Date(selectedDate).getDay();

        if (selectedDay === 2) {
          document.getElementById("dateWarning").textContent = "Appointments are not available on Tuesdays. Please choose another date.";
          this.value = '';
          tokenDisplay.textContent = '';
          return;
        }

        if (selectedDate !== todayStr && selectedDate !== tomorrowStr) {
          alert("You can only select today's or tomorrow's date.");
          this.value = '';
          tokenDisplay.textContent = '';
          return;
        }

        fetch('/get_token_count_koothali', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: selectedDate })
        })
        .then(response => response.json())
        .then(data => {
          if (data.count >= 25) {
            tokenDisplay.textContent = "Your Token Number will be: " + (data.count + 1);
          } else {
            tokenDisplay.textContent = "";
          }
        });
      });
    });

    document.getElementById("appointmentForm").addEventListener("submit", function (event) {
      const emailInput = document.getElementById("email").value.trim().toLowerCase();
      const warning = document.getElementById("emailWarning");
      const allowedDomains = ["gmail.com", "hotmail.com", "yahoo.com"];

      if (emailInput !== "") {
        const parts = emailInput.split("@");
        const localPart = parts[0];
        const domain = parts[1];

        const isValid = parts.length === 2 && localPart.length > 0 && allowedDomains.includes(domain);

        if (!isValid) {
          warning.textContent = "Please enter a valid email address or leave it blank.";
          event.preventDefault();
        } else {
          warning.textContent = "";
          const button = document.getElementById("submitBtn");
          button.disabled = true;
          button.innerText = "Booking...";
        }
      } else {
        warning.textContent = "";
        const button = document.getElementById("submitBtn");
        button.disabled = true;
        button.innerText = "Booking...";
      }
    });
    function showToast(message, type="error") {
  const toast = document.getElementById("toastMsg");
  const text = document.getElementById("toastText");
  const icon = document.getElementById("toastIcon");

  text.textContent = message;

  if (type === "error") {
    icon.className = "fa-solid fa-circle-exclamation";
    toast.className = "toast-msg toast-error";
  } else if (type === "success") {
    icon.className = "fa-solid fa-circle-check";
    toast.className = "toast-msg toast-success";
  } else {
    icon.className = "fa-solid fa-circle-info";
    toast.className = "toast-msg toast-info";
  }

  toast.style.display = "flex";

  setTimeout(() => {
    toast.style.display = "none";
  }, 6000);
}
  </script>
<script>
  {% if message %}
    showToast(`{{ message | safe }}`, "error");
  {% endif %}
</script>
</body>
</html>
