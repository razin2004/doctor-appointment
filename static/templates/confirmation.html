<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Appointment Confirmed | Dr. Sooppy's Clinic</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon1.ico') }}" type="image/x-icon">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #2563eb;
      --success: #059669;
      --navy-deep: #020617;
      --glass-bg: rgba(255, 255, 255, 0.98);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-muted: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--navy-deep);
      background-image: linear-gradient(rgba(2, 6, 23, 0.92), rgba(2, 6, 23, 0.85)), 
                        url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2000&auto=format&fit=crop');
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      color: var(--navy-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .confirmation-container {
      background: var(--glass-bg);
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      border-radius: 35px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: #ecfdf5;
      color: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 25px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: var(--navy-deep);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 35px;
    }

    /* --- DETAILS CARD --- */
    .details-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid #e2e8f0;
      text-align: left;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px dashed #e2e8f0;
    }

    .detail-item:last-child { border-bottom: none; }

    .detail-label {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-weight: 700;
      color: var(--navy-deep);
      font-size: 1rem;
    }

    .token-highlight {
      color: var(--primary);
      font-size: 1.4rem;
    }

    /* --- BUTTONS --- */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--navy-deep);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    .btn-outline {
      background: transparent;
      color: var(--navy-deep);
      border: 2px solid #e2e8f0;
    }

    .btn-outline:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    @media (max-width: 480px) {
      .confirmation-container { padding: 40px 25px; }
      h2 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="confirmation-container">
    <div class="success-icon">
      <i class="fa-solid fa-check-circle"></i>
    </div>
    
    <h2>Confirmed!</h2>
    <p class="subtitle">Your appointment has been successfully scheduled.</p>

    <div class="details-card">
      <div class="detail-item">
        <span class="detail-label">Patient</span>
        <span class="detail-value">{{ name }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Date</span>
        <span class="detail-value">{{ date }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Clinic Location</span>
        <span class="detail-value">{{ place }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Token Number</span>
        <span class="detail-value token-highlight">#{{ token }}</span>
      </div>
    </div>

    <div class="action-group">
      <a href="{{ url_for('download_pdf', name=name, date=date, token=token, place=place) }}" 
         class="btn btn-primary" target="_blank">
        <i class="fa-solid fa-file-pdf"></i> Download PDF Receipt
      </a>
      
      <a href="{{ url_for('index') }}" class="btn btn-outline">
        <i class="fa-solid fa-calendar-plus"></i> Book Another
      </a>
    </div>

    <p style="margin-top: 25px; font-size: 0.8rem; color: var(--text-muted);">
      Please arrive 10 minutes prior to your scheduled time.
    </p>
  </div>

</body>
</html>
